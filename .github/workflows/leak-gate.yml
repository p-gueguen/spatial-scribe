name: leak-gate

# Hygiene backstop: fail the build if an internal path, private IP, institutional email domain,
# project id, or API key ever lands in the tree. Generic patterns only (no names), and the workflow
# file excludes itself from the scan so its own denylist does not self-trip.
on:
  push:
  pull_request:

jobs:
  leak-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for internal references
        run: |
          set -uo pipefail
          PATTERNS='/srv/GT|/srv/gstore|/misc/GT|130\.60\.[0-9]|\b10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\b|\b192\.168\.[0-9]|\.ethz\.ch|uzh\.ch|\bp[0-9]{5}\b|sk-[A-Za-z0-9]{24,}'
          hits=$(git grep -nIiE "$PATTERNS" -- \
                   ':!.github/workflows/leak-gate.yml' \
                   ':!*.gif' ':!*.png' ':!*.jpg' ':!*.jpeg' \
                 | grep -v ';base64,' || true)
          if [ -n "$hits" ]; then
            echo "::error::Internal reference(s) found in the public tree:"
            echo "$hits"
            exit 1
          fi
          echo "leak-gate clean."
